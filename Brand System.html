<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Train With Irine — Brand System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { background: #EFEBE3; }
    body { margin: 0; font-family: "Manrope", sans-serif; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="cards-logo.jsx"></script>
  <script type="text/babel" src="cards-color-type.jsx"></script>
  <script type="text/babel" src="cards-components.jsx"></script>
  <script type="text/babel" src="cards-applications.jsx"></script>
  <script type="text/babel" src="card-direction-locked.jsx"></script>
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    const App = () => (
      <DesignCanvas title="Train With Irine — Brand System" subtitle="Editorial Warmth · Cormorant Garamond + Manrope · 2026">

        <DCSection id="cover" title="Cover">
          <DCArtboard id="cover" label="00 · System Cover" width={1520} height={1040}>
            <CoverCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="logo" title="Logo & Marks">
          <DCArtboard id="logo-primary" label="01 · Primary Wordmark" width={900} height={600}>
            <PrimaryLogoCard/>
          </DCArtboard>
          <DCArtboard id="logo-system" label="02 · Logo System" width={900} height={600}>
            <LogoSystemCard/>
          </DCArtboard>
          <DCArtboard id="logo-usage" label="03 · Usage · Do & Don't" width={1100} height={620}>
            <LogoUsageCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="color-type" title="Color & Type">
          <DCArtboard id="palette" label="04 · Palette" width={1100} height={780}>
            <ColorPaletteCard/>
          </DCArtboard>
          <DCArtboard id="type" label="05 · Type Pairing" width={1100} height={680}>
            <TypeCard/>
          </DCArtboard>
          <DCArtboard id="type-scale" label="06 · Type Scale" width={1100} height={830}>
            <TypeScaleCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="components" title="UI Components">
          <DCArtboard id="buttons" label="07 · Buttons & Tags" width={900} height={560}>
            <ButtonsCard/>
          </DCArtboard>
          <DCArtboard id="programmes" label="08 · Programme Cards" width={1100} height={620}>
            <ProgrammesCard/>
          </DCArtboard>
          <DCArtboard id="testimonial" label="09 · Testimonial" width={1100} height={560}>
            <TestimonialCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="direction" title="Direction · Locked">
          <DCArtboard id="direction-locked" label="Editorial Warmth · Cormorant Garamond + Manrope" width={1100} height={680}>
            <DirectionLockedCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="applications" title="Applications">
          <DCArtboard id="instagram" label="10 · Instagram Grid" width={1100} height={1280}>
            <InstagramCard/>
          </DCArtboard>
          <DCArtboard id="bcard" label="11 · Business Card" width={1000} height={580}>
            <BusinessCardCard/>
          </DCArtboard>
          <DCArtboard id="watermark" label="12 · Watermark" width={1000} height={620}>
            <WatermarkCard/>
          </DCArtboard>
          <DCArtboard id="hero" label="13 · Landing Hero" width={1280} height={840}>
            <HeroSampleCard/>
          </DCArtboard>
          <DCArtboard id="voice" label="14 · Voice & Tone" width={1100} height={560}>
            <VoiceCard/>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
